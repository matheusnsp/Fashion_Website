<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catia Poggian | Estrategista de Marca</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,900;1,6..96,700&family=Inter:wght@100;300;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="../css/about.css">
    <link rel="stylesheet" href="../css/services.css">
    <link rel="stylesheet" href="../css/newsletter.css">
</head>
<body>

    <div class="bg-wrapper">
        <video class="video" autoplay muted loop playsinline id="video-bg">
            <source src="../video.mp4" type="video/mp4">
        </video>
        <div class="overlay-vignette"></div>
    </div>

    <header class="main-header">
        <button class="hamburger" id="hamburger" aria-label="Abrir menu" aria-expanded="false">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </button>

        <nav class="nav-menu" id="nav-menu">
            <a href="/index.html" class="nav-link" data-i18n="nav.home">Home</a>
            <a href="services.html" class="nav-link" data-i18n="nav.services">Serviços</a>
            <a href="newsletter.html" class="nav-link" data-i18n="nav.newsletter">Newsletter</a>
            <span class="nav-divider">|</span>
            <button class="lang-toggle lang-toggle--desktop" id="lang-toggle-desktop">EN</button>
        </nav>
        <button class="lang-toggle lang-toggle--mobile" id="lang-toggle">EN</button>
    </header>

    <main id="main-container">

        <section class="newsletter-section" id="newsletter">
            <div class="newsletter-container">
                <div class="newsletter-content">
                    <span class="newsletter-subtitle" data-i18n="newsletter.subtitle">NEWSLETTER</span>
                    <h2 class="newsletter-title" data-i18n="newsletter.title">Receba insights estratégicos sobre 
                        <span style="color: #C5934C">imagem</span>, <span style="color: #C5934C">posicionamento</span> 
                        e <span style="color: #C5934C">estilo</span>, diretamente no seu e-mail.</h2>
                </div>

                <form class="newsletter-form" id="newsletter-form">
                    <div class="input-group">
                        <input type="email" id="email" data-i18n-placeholder="newsletter.placeholder" placeholder="E-MAIL" required>
                        <button type="submit" class="btn-newsletter" data-i18n="newsletter.btn">
                            INSCREVA-SE
                        </button>
                    </div>
                </form>
            </div>
        </section>

    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-identity">
                <a href="/index.html" class="footer-brand">Catia Poggian</a>
                <br>
                <p class="footer-details" data-i18n="footer.location">
                    © 2026 — RIO DE JANEIRO <span class="divider">/</span> MIAMI
                </p>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>
    <script src="/script.js"></script>
</body>
</html>
